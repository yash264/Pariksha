<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pariksha</title>
    <link rel="apple-touch-icon" sizes="180x180" href="Assets\favicon.ico">
    <link rel="icon" type="image.png" sizes="32x32" href="Assets\favicon.ico">
    <link rel="icon" type="image.png" sizes="16x16" href="Assets\favicon.ico">
    <style>
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 1px;
        }

        h1 {
            background-color: rgba(164, 223, 105, 0.692);
        }

        #navigation {
            text-decoration: none;
            background-color: rgba(131, 198, 236, 0.623);
            padding: 12px 60px;
            overflow: hidden;
            text-align: left;
        }

        #navigation a {
            display: block;
            padding: 4px;
            text-decoration: none;
            color: black;
            float: left;
            border-radius: 5px;
            margin: 2px 15px;
        }

        a:hover {
            background-color: rgb(247, 102, 102);
        }

        #footer {
            background-color: rgba(0, 0, 0, 0.945);
            color: white;
        }

        #question {
            width: 75%;
            text-align: center;
        }

        input {
            cursor: pointer;
            text-align: center;
            font-size: 17px;
        }

        #table{
            text-align: center;
        }

        main {
            display: grid;
        }

        img {
            width: 125px;
        }

        #submit {
            font-size: 16px;
            text-align: center;
            padding: 0x;
            background-color: rgb(233, 114, 77);
            border-radius: 6px;
        }

        #submit:hover {
            background-color: rgb(162, 92, 228);
        }
    </style>
</head>

<body>
    <h1>Welcome to Admin Section</h1>
    <nav id="navigation">
        <a href="admin.html">Back</a>
    </nav>
    <br>
    <main>
        <h3>Make a Quiz</h3>

        <form class="form">
            <label for="question" >Write Question</label>
            <br>
            <input type="text" placeholder="Enter your Question" id="question" name="question">
            <br>
            <br>
            <label for="option1">Option 1.</label>
            <input type="text" id="option1" name="option1" placeholder="Enter your Option">
            <label for="option2">Option 2.</label>
            <input type="text" id="option2" name="option2" placeholder="Enter your Option">
            <label for="option3" >Option 3.</label>
            <input type="text" id="option3" name="option3" placeholder="Enter your Option">
            <label for="option4" name="option4">Option 4.</label>
            <input type="text" id="option4"  name="option4" placeholder="Enter your Option">
            <br>
            <label for="correctAnswer" >Correct Answer.</label>
            <input type="text" id="correctAnswer" name="correctAnswer" placeholder="Enter your Answer">
            <br>
            <br>
            <button id="submit">Save</button>
        </form>
        
        <table border="3" bgcolor="white" id="table">
            <thead>
                <th bgcolor="orange">Serial No.</th>
                <th bgcolor="lightgreen">Question</th>
                <th bgcolor="lightgreen">Option1</th>
                <th bgcolor="lightgreen">Option2</th>
                <th bgcolor="lightgreen">Option3</th>
                <th bgcolor="lightgreen">Option4</th>
                <th bgcolor="lightgreen">Correct Answer</th>
            </thead>
            <tbody></tbody>
        </table>
    </main>
    <br>
    <div id="footer">
        <p>@ 2023 Designed, Developed and Hosted by National Informatics Center NIC</p>
    </div>
    <script>
        const formEl=document.querySelector("form");
        const tbodyEl=document.querySelector("tbody");
        const tableEl=document.querySelector("table");
        const form=document.querySelector("form");

        function onAddWebsite(e){
            e.preventDefault();
            const question = document.getElementById("question").value;
            const option1 = document.getElementById("option1").value;
            const option2 = document.getElementById("option2").value;
            const option3 = document.getElementById("option3").value;
            const option4 = document.getElementById("option4").value;
            const correctAnswer = document.getElementById("correctAnswer").value;
            tbodyEl.innerHTML +=`
            <tr>
                <td bgcolor="lightblue">1</td>
                <td>${question}</td>
                <td >${option1}</td>
                <td>${option2}</td>
                <td>${option3}</td>
                <td>${option4}</td>
                <td>${correctAnswer}</td>                
                <td><button class="deleteBtn" id="submit">Delete</button></td>
            </tr>
            `;
        };

        function onDeleteRow(e){
            if(!e.target.classList.contains("deleteBtn")){
                return;
            }
            const btn=e.target;
            btn.closest("tr").remove();
        }

        formEl.addEventListener("submit",onAddWebsite);
        tableEl.addEventListener("click",onDeleteRow);

    </script>

</body>

</html>
