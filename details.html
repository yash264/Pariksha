    <script>
        function search() {
            let student = document.getElementById("search").value;
            student = student.toLowerCase();
            let x = document.getElementsByClassName("students");

            for (i = 0; i <= x.length; i++) {
                if (!x[i].innerHTML.toLowerCase().includes(student)) {

                } else {
                    x[i].style.color = "red";
                }
            }
        }
